---
name: CDK Review

"on":
  workflow_call:
    inputs:
      aws-region:
        description: AWS region to deploy to
        type: string
        default: "us-east-1"
      cdk-version:
        description: CDK CLI npm version to install
        type: string
        default: "2.1106.1"
      smoke-test-url:
        description: URL to curl after deploy (optional)
        type: string
        default: ""
    secrets:
      AWS_ROLE_ARN:
        description: >-
          IAM role ARN for OIDC federation
          (optional — skips synth/diff if absent)
        required: false
jobs:
  review:
    name: Synth & Diff
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
      pull-requests: write
    env:
      AWS_ROLE_ARN: ${{ secrets.AWS_ROLE_ARN }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup CDK
        uses: Specter099/.github/.github/actions/setup-cdk@main
        with:
          cdk-version: ${{ inputs.cdk-version }}

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          [ -f requirements-dev.txt ] && pip install -r requirements-dev.txt || true

      - name: Lint (ruff)
        if: hashFiles('requirements-dev.txt') != '' && success()
        run: |
          if command -v ruff &> /dev/null; then
            ruff check .
          else
            echo "::notice::ruff not installed — skipping lint"
          fi

      - name: Unit tests
        if: hashFiles('tests/') != '' && success()
        run: |
          if command -v pytest &> /dev/null; then
            pytest tests/ -v || rc=$?
            if [ "${rc:-0}" -eq 5 ]; then
              echo "::notice::no tests collected — skipping"
            elif [ "${rc:-0}" -ne 0 ]; then
              exit "$rc"
            fi
          else
            echo "::notice::pytest not installed — skipping tests"
          fi

      - name: Dependency audit
        run: |
          if command -v pip-audit &> /dev/null; then
            pip-audit -r requirements.txt
          else
            echo "::notice::pip-audit not installed — skipping audit"
          fi

      - name: Configure AWS credentials
        if: env.AWS_ROLE_ARN != ''
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ inputs.aws-region }}

      - name: CDK Synth
        if: env.AWS_ROLE_ARN != ''
        run: cdk synth

      - name: SAST scan (bandit)
        run: |
          pip install bandit
          bandit -r . -ll --exclude .venv,cdk.out

      - name: CDK Nag (informational)
        if: env.AWS_ROLE_ARN != ''
        run: >-
          CDK_NAG=true cdk synth 2>&1
          | grep -E "^\[.*Nag\]|AwsSolutions" || true

      - name: CDK Diff
        if: env.AWS_ROLE_ARN != ''
        id: diff
        run: |
          diff_output=$(cdk diff 2>&1) || true
          echo "$diff_output"
          {
            echo "diff<<EOF"
            echo "$diff_output"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Comment diff on PR
        if: env.AWS_ROLE_ARN != ''
        uses: actions/github-script@v7
        env:
          DIFF: ${{ steps.diff.outputs.diff }}
        with:
          script: |
            const diff = process.env.DIFF;
            const body = `### CDK Diff\n\n\`\`\`\n${diff}\n\`\`\``;
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c =>
              c.user.type === 'Bot' && c.body.startsWith('### CDK Diff')
            );
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

      - name: AWS credentials not configured
        if: env.AWS_ROLE_ARN == ''
        run: echo "::warning::AWS_ROLE_ARN secret not set — skipping synth/diff"
