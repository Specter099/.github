name: Repo Backup to S3

on:
  workflow_call:
    inputs:
      s3-bucket:
        description: S3 bucket name to upload the backup to
        type: string
        required: true
      s3-prefix:
        description: Key prefix (folder) within the bucket (defaults to repo name)
        type: string
        default: ""
      aws-region:
        description: AWS region of the S3 bucket
        type: string
        default: "us-east-1"
      environment:
        description: GitHub environment whose secrets contain AWS_ROLE_ARN
        type: string
        default: "backup"
  workflow_dispatch:
    inputs:
      s3-bucket:
        description: S3 bucket name to upload the backup to
        type: string
        required: true
      s3-prefix:
        description: Key prefix (folder) within the bucket (defaults to repo name)
        type: string
        default: ""
      aws-region:
        description: AWS region of the S3 bucket
        type: string
        default: "us-east-1"
      environment:
        description: GitHub environment whose secrets contain AWS_ROLE_ARN
        type: string
        default: "backup"

jobs:
  backup:
    name: Backup to S3
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve inputs
        id: vars
        env:
          REPO_NAME: ${{ github.event.repository.name }}
          S3_PREFIX_INPUT: ${{ inputs.s3-prefix }}
        run: |
          PREFIX="$S3_PREFIX_INPUT"
          if [ -z "$PREFIX" ]; then
            PREFIX="$REPO_NAME"
          fi
          DATE=$(date -u +%Y-%m-%d)
          FILENAME="${REPO_NAME}-${DATE}-${GITHUB_SHA:0:7}.zip"
          echo "prefix=$PREFIX" >> "$GITHUB_OUTPUT"
          echo "filename=$FILENAME" >> "$GITHUB_OUTPUT"
          echo "s3-key=${PREFIX}/${FILENAME}" >> "$GITHUB_OUTPUT"

      - name: Create zip archive
        run: |
          git archive --format=zip --output="${{ steps.vars.outputs.filename }}" HEAD
          SIZE=$(du -sh "${{ steps.vars.outputs.filename }}" | cut -f1)
          echo "ARCHIVE_SIZE=$SIZE" >> "$GITHUB_ENV"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ inputs.aws-region }}

      - name: Upload to S3
        env:
          FILENAME: ${{ steps.vars.outputs.filename }}
          S3_BUCKET: ${{ inputs.s3-bucket }}
          S3_KEY: ${{ steps.vars.outputs.s3-key }}
        run: |
          aws s3 cp "$FILENAME" "s3://$S3_BUCKET/$S3_KEY"

      - name: Write job summary
        env:
          FILENAME: ${{ steps.vars.outputs.filename }}
          S3_BUCKET: ${{ inputs.s3-bucket }}
          S3_KEY: ${{ steps.vars.outputs.s3-key }}
        run: |
          {
            echo "## Repo Backup"
            echo "| Field | Value |"
            echo "|-------|-------|"
            echo "| Repository | \`${GITHUB_REPOSITORY}\` |"
            echo "| Commit | \`${GITHUB_SHA}\` |"
            echo "| Archive | \`${FILENAME}\` |"
            echo "| Size | ${ARCHIVE_SIZE} |"
            echo "| S3 URI | \`s3://${S3_BUCKET}/${S3_KEY}\` |"
          } >> "$GITHUB_STEP_SUMMARY"
