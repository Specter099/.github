name: Self Test

# PR check for this repo's own scripts and workflow YAML. Per repo convention,
# checks trigger on pull_request to main only; main correctness is covered by
# branch protection.
on:
  pull_request:
    branches: [main]

jobs:
  test:
    name: Lint & Test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-dev.txt

      - name: Install dev dependencies
        run: pip install -r requirements-dev.txt

      - name: Lint YAML (yamllint)
        run: yamllint -c .yamllint.yml .github/

      - name: Run tests (pytest)
        run: pytest tests/ -v
