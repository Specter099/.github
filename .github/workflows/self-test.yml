name: Self Test

# PR check for this repo's own scripts and workflow YAML. Per repo convention,
# checks trigger on pull_request to main only; main correctness is covered by
# branch protection.
on:
  pull_request:
    branches: [main]

jobs:
  test:
    name: Lint & Test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5.6.0
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dev dependencies
        run: pip install -r requirements-dev.txt

      - name: Lint YAML (yamllint)
        run: yamllint -c .yamllint.yml .github/

      - name: Run tests (pytest)
        run: pytest tests/ -v
