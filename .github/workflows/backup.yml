name: Backup to S3

on:
  schedule:
    - cron: "0 2 * * 0"  # weekly, Sunday 02:00 UTC
  workflow_dispatch:

jobs:
  backup:
    name: Backup to S3
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: production
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Resolve inputs
        id: vars
        env:
          REPO_NAME: ${{ github.event.repository.name }}
          SHA: ${{ github.sha }}
        run: |
          DATE=$(date -u +%Y-%m-%d)
          FILENAME="${REPO_NAME}-${DATE}-${SHA:0:7}.zip"
          echo "filename=$FILENAME" >> "$GITHUB_OUTPUT"
          echo "s3-key=${REPO_NAME}/${FILENAME}" >> "$GITHUB_OUTPUT"

      - name: Create zip archive
        env:
          FILENAME: ${{ steps.vars.outputs.filename }}
        run: |
          git archive --format=zip --output="$FILENAME" HEAD
          SIZE=$(du -sh "$FILENAME" | cut -f1)
          echo "ARCHIVE_SIZE=$SIZE" >> "$GITHUB_ENV"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@7474bc4690e29a8392af63c5b98e7449536d5c3a  # v4.3.1
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1

      - name: Upload to S3
        env:
          FILENAME: ${{ steps.vars.outputs.filename }}
          S3_BUCKET: ${{ vars.BACKUP_S3_BUCKET }}
          S3_KEY: ${{ steps.vars.outputs.s3-key }}
        run: |
          aws s3 cp "$FILENAME" "s3://${S3_BUCKET}/${S3_KEY}"

      - name: Write job summary
        env:
          REPOSITORY: ${{ github.repository }}
          SHA: ${{ github.sha }}
          FILENAME: ${{ steps.vars.outputs.filename }}
          S3_BUCKET: ${{ vars.BACKUP_S3_BUCKET }}
          S3_KEY: ${{ steps.vars.outputs.s3-key }}
        run: |
          {
            echo "## Repo Backup"
            echo "| Field | Value |"
            echo "|-------|-------|"
            echo "| Repository | \`${REPOSITORY}\` |"
            echo "| Commit | \`${SHA}\` |"
            echo "| Archive | \`${FILENAME}\` |"
            echo "| Size | $ARCHIVE_SIZE |"
            echo "| S3 URI | \`s3://${S3_BUCKET}/${S3_KEY}\` |"
          } >> "$GITHUB_STEP_SUMMARY"
