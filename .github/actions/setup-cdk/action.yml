name: Setup CDK
description: Install Python 3.12, Node 22, pinned CDK CLI, and Python dependencies

inputs:
  cdk-version:
    description: CDK CLI version to install
    required: false
    default: "2.1106.1"

runs:
  using: composite
  steps:
    - uses: actions/setup-python@v5
      with:
        python-version: "3.12"
        cache: pip

    - uses: actions/setup-node@v4
      with:
        node-version: "22"

    - name: Cache npm
      uses: actions/cache@v4
      with:
        path: ~/.npm
        key: npm-${{ runner.os }}-cdk-${{ inputs.cdk-version }}

    - name: Install CDK CLI
      shell: bash
      run: npm install -g aws-cdk@${{ inputs.cdk-version }}

    - name: Install Python dependencies
      shell: bash
      run: pip install -r requirements.txt
