version: 2
updates:
  # Keep third-party and first-party GitHub Actions SHA pins current.
  # Dependabot understands `@<sha>  # vX.Y.Z` pins and bumps both the SHA
  # and the trailing version comment together.
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    commit-message:
      prefix: ci
    groups:
      github-actions:
        patterns:
          - "*"
